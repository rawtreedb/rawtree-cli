services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rawtree
      POSTGRES_USER: default
      POSTGRES_PASSWORD: random_password
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U default -d rawtree"]
      interval: 3s
      timeout: 3s
      retries: 30

  rawtree-keeper:
    image: rawtree/rawtree-keeper:26.3
    volumes:
      - keeper_data:/var/lib/rawtree-keeper
      - ./rawtree-config/config.d/keeper.xml:/etc/rawtree-keeper/keeper_config.xml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rawtree-keeper-client -h localhost -p 9181 -q 'exists \"/\"'",
        ]
      interval: 3s
      timeout: 3s
      start_period: 10s
      retries: 30

  rawtree:
    image: rawtree/rawtree-server:26.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - rawtree_data:/var/lib/rawtree
      - ./rawtree-config/config.d/replicated.xml:/etc/rawtree-server/config.d/replicated.xml:ro
    environment:
      RAWTREE_USER: default
      RAWTREE_PASSWORD: random_password
      RAWTREE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rawtree-client --user default --password random_password -q 'SELECT 1'",
        ]
      interval: 3s
      timeout: 3s
      retries: 30
    depends_on:
      rawtree-keeper:
        condition: service_healthy

  backend-migrate:
    image: rawtree/backend:latest
    environment:
      RAWTREE_POSTGRES_URL: postgres://default:random_password@postgres:5432/rawtree
    command:
      [
        "sh",
        "-ec",
        "sqlx migrate run --source /app/migrations --database-url \"$$RAWTREE_POSTGRES_URL\" || { sqlx migrate revert --source /app/migrations --database-url \"$$RAWTREE_POSTGRES_URL\"; exit 1; }",
      ]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: rawtree/backend:latest
    ports:
      - "3000:3000"
      - "9090:9090"
    environment:
      RAWTREE_URL: http://rawtree:8123
      RAWTREE_USER: default
      RAWTREE_PASSWORD: random_password
      RAWTREE_POSTGRES_URL: postgres://default:random_password@postgres:5432/rawtree
      RAWTREE_HOST: 0.0.0.0
      RAWTREE_PORT: "3000"
      RAWTREE_JWT_SECRET: change-this-to-a-secure-random-string
      RAWTREE_DISABLE_RATE_LIMIT: "true"
      RAWTREE_CORS_ORIGINS: http://localhost:5173,http://localhost:8080,http://localhost:3001,http://localhost:7421
      RAWTREE_GITHUB_CLIENT_ID: ${RAWTREE_GITHUB_CLIENT_ID:-ci-github-client-id}
      RAWTREE_GITHUB_CLIENT_SECRET: ${RAWTREE_GITHUB_CLIENT_SECRET:-ci-github-client-secret}
      RAWTREE_GITHUB_REDIRECT_URI: http://localhost:3000/v1/auth/github/callback
      RAWTREE_GOOGLE_CLIENT_ID: ${RAWTREE_GOOGLE_CLIENT_ID:-ci-google-client-id}
      RAWTREE_GOOGLE_CLIENT_SECRET: ${RAWTREE_GOOGLE_CLIENT_SECRET:-ci-google-client-secret}
      RAWTREE_GOOGLE_REDIRECT_URI: http://localhost:3000/v1/auth/google/callback
      RAWTREE_FRONTEND_URL: ${RAWTREE_FRONTEND_URL:-http://localhost:8080}
      RAWTREE_EMAIL_FROM: no-reply@rawtree.dev
      RAWTREE_EMAIL_FROM_NAME: RawTree
      RAWTREE_METRICS_PORT: "9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
      rawtree:
        condition: service_healthy

volumes:
  postgres_data:
  keeper_data:
  rawtree_data:
